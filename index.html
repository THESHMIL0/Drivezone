<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Ultimate Open World</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; user-select: none; -webkit-user-select: none; font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: none; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,20,40,0.9); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #startBtn { padding: 15px 40px; font-size: 24px; font-weight: bold; background: #00e5ff; color: #000; border: none; border-radius: 8px; box-shadow: 0 0 20px #00e5ff; margin-top: 20px; }
        #uiTop { position: absolute; top: 15px; left: 15px; width: calc(100% - 30px); display: none; justify-content: space-between; align-items: flex-start; z-index: 60; pointer-events: none; }
        .hud-left { display: flex; flex-direction: column; gap: 10px; }
        #minimap { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #00e5ff; background: rgba(0,0,0,0.6); box-shadow: 0 0 15px rgba(0,229,255,0.4); }
        .hud-panel { background: rgba(0, 20, 40, 0.7); border: 2px solid #00e5ff; border-radius: 12px; padding: 5px 15px; color: #fff; font-weight: bold; font-size: 16px; box-shadow: 0 0 10px rgba(0,229,255,0.4); backdrop-filter: blur(5px); display: flex; align-items: center; gap: 8px; }
        .hud-value { color: #00e5ff; font-family: monospace; font-size: 20px; }
        #cameraArea { position: absolute; top: 0; left: 0; width: 100%; height: 50%; z-index: 10; }
        #controls { position: absolute; bottom: 25px; width: 100%; display: none; justify-content: space-between; align-items: flex-end; padding: 0 30px; box-sizing: border-box; z-index: 50; }
        #steeringArea { width: 140px; height: 140px; position: relative; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #steeringWheel { width: 100%; height: 100%; border-radius: 50%; border: 12px solid #222; box-sizing: border-box; background: radial-gradient(circle, #333 30%, transparent 40%); box-shadow: 0 10px 20px rgba(0,0,0,0.5), inset 0 5px 10px rgba(255,255,255,0.2); transition: transform 0.1s; }
        #steeringWheel::before { content: ''; position: absolute; top: 50%; left: -5px; right: -5px; height: 20px; background: #222; transform: translateY(-50%); border-radius: 5px; }
        #steeringWheel::after { content: ''; position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; background: #ff3333; border-radius: 50%; transform: translate(-50%, -50%); border: 3px solid #111; }
        .pedals { display: flex; gap: 15px; position: relative; }
        .btn { width: 70px; height: 70px; border-radius: 15px; font-size: 14px; font-weight: 900; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 0 rgba(0,0,0,0.4); user-select: none; text-shadow: 1px 1px 2px #000; }
        .btn:active { transform: translateY(8px); box-shadow: 0 0 0 rgba(0,0,0,0.4); }
        #btnGas { background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%); height: 90px; border: 2px solid #88e1ff; }
        #btnRev { background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%); border: 2px solid #ff9999; }
        #btnHorn { position: absolute; bottom: 105px; right: 0; width: 55px; height: 55px; border-radius: 50%; background: linear-gradient(135deg, #f12711 0%, #f5af19 100%); border: 2px solid #ffeeaa; font-weight: bold; font-size: 11px; display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 0 #b33900; z-index: 60; color: white; }
        #btnHorn:active { transform: translateY(6px); box-shadow: none; }
        #settingsBtn { position: absolute; top: 15px; right: 15px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.9); border: 2px solid #333; font-size: 20px; display: flex; align-items: center; justify-content: center; z-index: 100; pointer-events: auto; }
        #settingsMenu { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; border: 3px solid #333; z-index: 200; text-align: center; }
        #installBtn, #closeSettings { background: #28a745; color: white; padding: 10px 20px; font-size: 16px; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>
    <div id="cameraArea"></div>
    <div id="uiTop">
        <div class="hud-left">
            <canvas id="minimap"></canvas>
            <div class="hud-panel">💰 <span class="hud-value" id="coinCount">0</span></div>
        </div>
        <div class="hud-panel">⚡ <span class="hud-value" id="speedometer">0</span> KM/H</div>
    </div>
    <div id="startScreen">
        <h1 style="font-size: 40px; margin: 0; color: #00e5ff; text-shadow: 0 0 10px #00e5ff;">OPEN WORLD</h1>
        <button id="startBtn">START ENGINE</button>
    </div>
    <div id="settingsBtn">⚙️</div>
    <div id="settingsMenu"><h2>Settings</h2><button id="installBtn" style="display:none;">📲 Install Game</button><br><button id="closeSettings" style="background:#dc3545;">Close</button></div>
    <div id="controls">
        <div id="steeringArea"><div id="steeringWheel"></div></div>
        <div class="pedals">
            <div id="btnHorn">HORN</div>
            <div class="btn" id="btnRev">BRAKE</div>
            <div class="btn" id="btnGas">GAS</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        let deferredPrompt; const installBtn = document.getElementById('installBtn');
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'inline-block'; });
        installBtn.addEventListener('click', async () => { if(deferredPrompt) { deferredPrompt.prompt(); const { outcome } = await deferredPrompt.userChoice; if(outcome === 'accepted') installBtn.style.display = 'none'; deferredPrompt = null; } });
        document.getElementById('settingsBtn').addEventListener('click', () => document.getElementById('settingsMenu').style.display = 'block');
        document.getElementById('closeSettings').addEventListener('click', () => document.getElementById('settingsMenu').style.display = 'none');

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x8ae5ff); 
        scene.fog = new THREE.FogExp2(0x8ae5ff, 0.005);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.7); scene.add(hemiLight);
        const sunLight = new THREE.DirectionalLight(0xffffee, 0.9);
        sunLight.position.set(80, 120, -50); sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024; sunLight.shadow.mapSize.height = 1024;
        const d = 100; sunLight.shadow.camera.left = -d; sunLight.shadow.camera.right = d; sunLight.shadow.camera.top = d; sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.bias = -0.0005; scene.add(sunLight);

        // --- CRISP TEXTURES FIX ---
        function createRoadTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = '#222222'; ctx.fillRect(0, 0, 256, 256); 
            ctx.fillStyle = '#ffffff'; ctx.fillRect(120, 0, 16, 128); 
            const tex = new THREE.CanvasTexture(canvas); 
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; 
            tex.magFilter = THREE.NearestFilter; // Fixes blurriness on mobile!
            tex.needsUpdate = true; return tex;
        }
        function createWindowTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = '#1a2a3a'; ctx.fillRect(0, 0, 256, 256); 
            for(let x=10; x<256; x+=40) { for(let y=10; y<256; y+=50) { ctx.fillStyle = Math.random() > 0.6 ? '#ffeba1' : '#0a1015'; ctx.fillRect(x, y, 20, 30); } }
            const tex = new THREE.CanvasTexture(canvas); 
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; 
            tex.magFilter = THREE.NearestFilter; tex.needsUpdate = true; return tex;
        }
        const roadTexture = createRoadTexture(); roadTexture.repeat.set(40, 40);
        const windowTexture = createWindowTexture(); windowTexture.repeat.set(2, 4);
        // --- FIXED SPORTS CAR ---
        const car = new THREE.Group();
        const chassis = new THREE.Group(); 
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.2, metalness: 0.5 });
        
        // Sleek flat body
        const body = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.5, 4.5), bodyMat); 
        body.position.y = 0.5; body.castShadow = true; chassis.add(body);
        
        // FIXED CABIN: Just a clean, sleek box so it never glitches into a diamond
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.05, metalness: 0.9 });
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 2.2), glassMat);
        cabin.position.set(0, 1.0, -0.2); cabin.castShadow = true; chassis.add(cabin);

        // Spoiler
        const spoiler = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.1, 0.4), bodyMat); spoiler.position.set(0, 1.1, -2); chassis.add(spoiler);
        const strut1 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), new THREE.MeshStandardMaterial({color: 0x111})); strut1.position.set(-0.6, 0.9, -2); chassis.add(strut1);
        const strut2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), new THREE.MeshStandardMaterial({color: 0x111})); strut2.position.set(0.6, 0.9, -2); chassis.add(strut2);

        window.headLightMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xddffff, emissiveIntensity: 1 });
        const hlLeft = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.1), window.headLightMat); hlLeft.position.set(-0.8, 0.55, 2.25); chassis.add(hlLeft);
        const hlRight = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.15, 0.1), window.headLightMat); hlRight.position.set(0.8, 0.55, 2.25); chassis.add(hlRight);
        
        car.add(chassis); 

        const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 16);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.9 });
        const rimMat = new THREE.MeshStandardMaterial({ color: 0xaaaaaa, metalness: 0.9 });
        function createWheel(x, z) {
            const pivot = new THREE.Group(); pivot.position.set(x, 0.45, z);
            const wheel = new THREE.Mesh(wheelGeo, wheelMat); wheel.rotation.z = Math.PI / 2; wheel.castShadow = true;
            const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.42, 8), rimMat); rim.rotation.z = Math.PI / 2;
            pivot.add(wheel); pivot.add(rim); car.add(pivot); return pivot;
        }
        const frontLeftWheel = createWheel(-1.2, 1.4); const frontRightWheel = createWheel(1.2, 1.4);
        createWheel(-1.2, -1.4); createWheel(1.2, -1.4);
        scene.add(car);

        // --- MAP ZONES ---
        const colors = { sidewalk: 0xcccccc, sand: 0xe6c27a, ocean: 0x0288d1, hospitalBlue: 0x4fc3f7, awningRed: 0xe53935 };
        
        const cityGround = new THREE.Mesh(new THREE.PlaneGeometry(280, 400), new THREE.MeshStandardMaterial({ map: roadTexture, roughness: 0.8 }));
        cityGround.rotation.x = -Math.PI / 2; cityGround.position.set(-60, 0, 0); cityGround.receiveShadow = true; scene.add(cityGround);

        const sand = new THREE.Mesh(new THREE.PlaneGeometry(100, 400), new THREE.MeshStandardMaterial({ color: colors.sand, roughness: 1 }));
        sand.rotation.x = -Math.PI / 2; sand.position.set(130, 0.05, 0); sand.receiveShadow = true; scene.add(sand);

        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(200, 400), new THREE.MeshStandardMaterial({ color: colors.ocean, transparent: true, opacity: 0.85, metalness: 0.2 }));
        ocean.rotation.x = -Math.PI / 2; ocean.position.set(280, -0.3, 0); scene.add(ocean);

        // --- DETAILED BUILDINGS (Like the Reference Image) ---
        const buildingColliders = []; const coins = []; const blockSize = 35; 
        
        function spawnCoin(x, z) {
            const coin = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 0.2, 16), new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x332200, metalness: 1 }));
            coin.rotation.x = Math.PI / 2; coin.position.set(x, 1.5, z); scene.add(coin);
            coins.push({ mesh: coin, hitBox: new THREE.Box3() });
        }

        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 3), new THREE.MeshStandardMaterial({ color: 0x4e342e })); trunk.position.y = 1.5; trunk.castShadow = true; tree.add(trunk);
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(2.5, 5, 6), new THREE.MeshStandardMaterial({ color: 0x2e7d32, flatShading: true })); leaves.position.y = 5; leaves.castShadow = true; tree.add(leaves);
            tree.position.set(x, 0, z); scene.add(tree);
        }

        function createLowPolyBuilding(x, z) {
            const bldgGroup = new THREE.Group();
            const type = Math.floor(Math.random() * 4); 
            
            // Base sidewalk
            const sidewalk = new THREE.Mesh(new THREE.BoxGeometry(26, 0.4, 26), new THREE.MeshStandardMaterial({ color: colors.sidewalk })); 
            sidewalk.position.y = 0.2; sidewalk.receiveShadow = true; bldgGroup.add(sidewalk);

            if (type === 0) { 
                // GLASS SKYSCRAPER
                const height = 25; const body = new THREE.Mesh(new THREE.BoxGeometry(14, height, 14), new THREE.MeshStandardMaterial({ map: windowTexture, metalness: 0.3 })); 
                body.position.y = height / 2; body.castShadow = true; bldgGroup.add(body);
            } else if (type === 1) {
                // CAFE WITH STRIPED AWNING
                const body = new THREE.Mesh(new THREE.BoxGeometry(14, 10, 14), new THREE.MeshStandardMaterial({ color: 0x5D4037 })); body.position.y = 5; body.castShadow = true; bldgGroup.add(body);
                const awning = new THREE.Mesh(new THREE.BoxGeometry(15, 0.5, 4), new THREE.MeshStandardMaterial({ color: colors.awningRed })); 
                awning.position.set(0, 6, 7.5); awning.rotation.x = -Math.PI/6; awning.castShadow = true; bldgGroup.add(awning);
                const door = new THREE.Mesh(new THREE.BoxGeometry(3, 4, 0.2), new THREE.MeshStandardMaterial({ color: 0x111 })); door.position.set(0, 2, 7.1); bldgGroup.add(door);
            } else if (type === 2) {
                // HOSPITAL (Blue/White with Roof AC)
                const body = new THREE.Mesh(new THREE.BoxGeometry(16, 15, 12), new THREE.MeshStandardMaterial({ color: colors.hospitalBlue })); body.position.y = 7.5; body.castShadow = true; bldgGroup.add(body);
                const stripe = new THREE.Mesh(new THREE.BoxGeometry(16.2, 1.5, 12.2), new THREE.MeshStandardMaterial({ color: 0xffffff })); stripe.position.y = 10; bldgGroup.add(stripe);
                const acUnit = new THREE.Mesh(new THREE.BoxGeometry(3, 2, 3), new THREE.MeshStandardMaterial({ color: 0x999 })); acUnit.position.set(3, 16, 0); acUnit.castShadow = true; bldgGroup.add(acUnit);
            } else {
                // BANK WITH PILLARS
                const roof = new THREE.Mesh(new THREE.ConeGeometry(11, 6, 4), new THREE.MeshStandardMaterial({ color: 0x8b0000 })); roof.position.y = 13; roof.rotation.y = Math.PI/4; roof.castShadow = true; bldgGroup.add(roof);
                const base = new THREE.Mesh(new THREE.BoxGeometry(14, 10, 12), new THREE.MeshStandardMaterial({ color: 0xffecb3 })); base.position.set(0, 5, -1); base.castShadow = true; bldgGroup.add(base);
                for(let p = -5; p <= 5; p+= 5) { const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 10), new THREE.MeshStandardMaterial({ color: 0xffffff })); pillar.position.set(p, 5, 6); pillar.castShadow = true; bldgGroup.add(pillar); }
            }

            bldgGroup.rotation.y = (Math.floor(Math.random() * 4)) * (Math.PI / 2); bldgGroup.position.set(x, 0, z); scene.add(bldgGroup);
            
            // HITBOX ONLY COVERS THE WALLS (You can drive on the sidewalk now!)
            const hitBox = new THREE.Box3(); hitBox.setFromCenterAndSize(new THREE.Vector3(x, 5, z), new THREE.Vector3(16, 20, 16));
            buildingColliders.push(hitBox);

            if (Math.random() > 0.6) createTree(x + 10, z + 10);
            if (Math.random() > 0.5) spawnCoin(x + blockSize/2, z);
        }

        for (let x = -140; x <= 140; x += blockSize) {
            for (let z = -140; z <= 140; z += blockSize) {
                if (x < 105 && (Math.abs(x) > 10 || Math.abs(z) > 10)) createLowPolyBuilding(x, z);
            }
        }
        // --- CONTROLS, PARTICLES & MINIMAP ---
        let speed = 0, score = 0, acceleration = 0.02, steeringAngle = 0, cameraOrbitAngle = 0, isDraggingCamera = false, startDragX = 0;
        let input = { gas: false, rev: false, horn: false }; 
        const particles = []; const smokeGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3); const smokeMat = new THREE.MeshLambertMaterial({ color: 0x999999, transparent: true, opacity: 0.8 });
        
        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); input[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); input[key] = false; });
        };
        bindBtn('btnGas', 'gas'); bindBtn('btnRev', 'rev'); bindBtn('btnHorn', 'horn');

        const steeringArea = document.getElementById('steeringArea'); const steeringUI = document.getElementById('steeringWheel');
        let isSteering = false;
        steeringArea.addEventListener('touchstart', (e) => { e.preventDefault(); isSteering = true; });
        steeringArea.addEventListener('touchend', (e) => { e.preventDefault(); isSteering = false; steeringAngle = 0; steeringUI.style.transform = `rotate(0deg)`; });
        steeringArea.addEventListener('touchmove', (e) => {
            if (!isSteering) return; e.preventDefault();
            const touch = e.touches[0]; const rect = steeringArea.getBoundingClientRect();
            let angleDeg = Math.atan2(touch.clientY - (rect.top + rect.height/2), touch.clientX - (rect.left + rect.width/2)) * (180 / Math.PI) + 90;
            if (angleDeg > 180) angleDeg -= 360; if (angleDeg > 90) angleDeg = 90; if (angleDeg < -90) angleDeg = -90;
            steeringUI.style.transform = `rotate(${angleDeg}deg)`; steeringAngle = angleDeg / 90; 
        });

        const camArea = document.getElementById('cameraArea');
        camArea.addEventListener('touchstart', (e) => { isDraggingCamera = true; startDragX = e.touches[0].clientX; });
        camArea.addEventListener('touchend', () => { isDraggingCamera = false; });
        camArea.addEventListener('touchmove', (e) => { if (isDraggingCamera) { cameraOrbitAngle += (e.touches[0].clientX - startDragX) * 0.005; startDragX = e.touches[0].clientX; } });

        document.getElementById('startBtn').addEventListener('click', () => {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
            try { screen.orientation.lock('landscape'); } catch(e) {}
            document.getElementById('startScreen').style.display = 'none'; 
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('uiTop').style.display = 'flex';
        });

        const mapCanvas = document.getElementById('minimap'); const ctx = mapCanvas.getContext('2d');
        function updateMinimap() {
            ctx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
            ctx.fillStyle = '#00e5ff'; ctx.beginPath(); ctx.arc(50, 50, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#777';
            for (let x = -140; x <= 140; x += blockSize) {
                for (let z = -140; z <= 140; z += blockSize) {
                    const relX = (x - car.position.x) * 0.3 + 50; const relZ = (z - car.position.z) * 0.3 + 50;
                    if(relX > 0 && relX < 100 && relZ > 0 && relZ < 100 && x < 105) ctx.fillRect(relX - 4, relZ - 4, 8, 8);
                }
            }
        }

        // --- GAME LOOP ---
        const cameraTarget = new THREE.Vector3(); const carBox = new THREE.Box3();
        function animate() {
            requestAnimationFrame(animate);
            const oldX = car.position.x; const oldZ = car.position.z;

            let cMaxSpeed = 0.7; let cFric = 0.96;
            if (car.position.x > 80) { cMaxSpeed = 0.3; cFric = 0.93; smokeMat.color.setHex(colors.sand); } 
            else { smokeMat.color.setHex(0x999999); }

            if (input.gas) speed += acceleration; if (input.rev) speed -= acceleration;
            speed *= cFric; if (speed > cMaxSpeed) speed = cMaxSpeed; if (speed < -cMaxSpeed / 2) speed = -cMaxSpeed / 2;

            frontLeftWheel.rotation.y = -steeringAngle * (Math.PI / 4); frontRightWheel.rotation.y = -steeringAngle * (Math.PI / 4);
            if (Math.abs(speed) > 0.005) car.rotation.y -= (steeringAngle * 0.06) * (speed > 0 ? 1 : -1);

            car.position.x += Math.sin(car.rotation.y) * speed; car.position.z += Math.cos(car.rotation.y) * speed;

            document.getElementById('speedometer').innerText = Math.abs(speed) > 0.01 ? Math.abs(Math.round((speed / cMaxSpeed) * 160)) : 0;
            updateMinimap();

            chassis.rotation.z += (steeringAngle * (speed / cMaxSpeed) * 0.15 - chassis.rotation.z) * 0.1;
            chassis.rotation.x += ((input.gas ? -0.05 : input.rev ? 0.05 : 0) - chassis.rotation.x) * 0.1;
            if (input.horn) { chassis.position.y = Math.random() * 0.05; window.headLightMat.emissive.setHex(0xffaa00); } 
            else { chassis.position.y = 0; window.headLightMat.emissive.setHex(0xddffff); }

            if (Math.abs(speed) > 0.05 && Math.random() > 0.5) {
                const smoke = new THREE.Mesh(smokeGeo, smokeMat.clone()); smoke.position.set(car.position.x - Math.sin(car.rotation.y)*2.2, 0.4, car.position.z - Math.cos(car.rotation.y)*2.2);
                scene.add(smoke); particles.push({ mesh: smoke, life: 1.0 });
            }
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.life -= 0.02; p.mesh.position.y += 0.03; p.mesh.scale.setScalar(p.life); p.mesh.material.opacity = p.life;
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

            carBox.setFromObject(car); carBox.expandByScalar(-0.2); 
            for(let i = coins.length - 1; i >= 0; i--) {
                let c = coins[i]; c.mesh.rotation.y += 0.05; c.hitBox.setFromObject(c.mesh);
                if (carBox.intersectsBox(c.hitBox)) { scene.remove(c.mesh); coins.splice(i, 1); score++; document.getElementById('coinCount').innerText = score; }
            }

            if (car.position.x > 180) car.position.x = 180; if (car.position.x < -180) car.position.x = -180;
            if (car.position.z > 180) car.position.z = 180; if (car.position.z < -180) car.position.z = -180;

            for (let i = 0; i < buildingColliders.length; i++) {
                if (carBox.intersectsBox(buildingColliders[i])) {
                    car.position.x = oldX - (Math.sin(car.rotation.y) * 0.2); car.position.z = oldZ - (Math.cos(car.rotation.y) * 0.2); speed = 0; break;
                }
            }

            if ((input.gas || input.rev) && !isDraggingCamera) cameraOrbitAngle *= 0.9; 
            const finalCamAngle = car.rotation.y + cameraOrbitAngle;
            const idealOffset = new THREE.Vector3(car.position.x - Math.sin(finalCamAngle)*9, car.position.y + 4.5, car.position.z - Math.cos(finalCamAngle)*9);
            camera.position.lerp(idealOffset, 0.15); cameraTarget.lerp(car.position, 0.25); camera.lookAt(cameraTarget);
            
            sunLight.position.set(car.position.x + 50, 100, car.position.z - 50); sunLight.target = car;
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
