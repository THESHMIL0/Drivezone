<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Next-Gen Mobile Driving</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; user-select: none; -webkit-user-select: none; font-family: sans-serif; touch-action: none; }
        
        #startBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 24px; font-weight: bold; background: #ff5722; color: white; border: none; border-radius: 10px; z-index: 100; }
        
        #settingsBtn { position: absolute; top: 15px; right: 15px; width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.8); border: 2px solid #333; font-size: 24px; display: flex; align-items: center; justify-content: center; z-index: 100; }
        #settingsMenu { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border-radius: 15px; border: 3px solid #333; z-index: 200; text-align: center; }
        #installBtn { display: none; background: #28a745; color: white; padding: 15px 30px; font-size: 18px; border: none; border-radius: 8px; font-weight: bold; margin-top: 15px; }
        #closeSettings { background: #dc3545; color: white; padding: 10px 20px; font-size: 16px; border: none; border-radius: 8px; margin-top: 10px; }

        /* Camera Drag Area (Top Half of Screen) */
        #cameraArea { position: absolute; top: 0; left: 0; width: 100%; height: 50%; z-index: 10; }

        #controls { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; align-items: flex-end; padding: 0 30px; box-sizing: border-box; z-index: 50; }
        #steeringArea { width: 130px; height: 130px; background: rgba(0,0,0,0.3); border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; }
        #steeringWheel { font-size: 90px; line-height: 1; pointer-events: none; transition: transform 0.1s ease-out; }
        .pedals { display: flex; gap: 15px; }
        .btn { width: 70px; height: 70px; border-radius: 10px; background: rgba(255, 255, 255, 0.7); border: 3px solid #333; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 0 #555; }
        .btn:active { transform: translateY(4px); box-shadow: none; }
        #btnGas { background: rgba(40, 167, 69, 0.9); color: white; height: 90px; }
        #btnRev { background: rgba(220, 53, 69, 0.9); color: white; }
    </style>
</head>
<body>

    <div id="cameraArea"></div>

    <div id="settingsBtn">⚙️</div>
    <div id="settingsMenu">
        <h2>Settings</h2>
        <button id="installBtn">📲 Install Game</button><br>
        <button id="closeSettings">Close</button>
    </div>

    <button id="startBtn">START ENGINE</button>

    <div id="controls">
        <div id="steeringArea"><div id="steeringWheel">🛞</div></div>
        <div class="pedals">
            <div class="btn" id="btnRev">BRAKE</div>
            <div class="btn" id="btnGas">GAS</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        // --- 1. REGISTER SERVICE WORKER & PWA ---
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("Service Worker Active!"));
        }
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault(); deferredPrompt = e; installBtn.style.display = 'inline-block';
        });
        installBtn.addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') installBtn.style.display = 'none';
                deferredPrompt = null;
            }
        });

        document.getElementById('settingsBtn').addEventListener('click', () => document.getElementById('settingsMenu').style.display = 'block');
        document.getElementById('closeSettings').addEventListener('click', () => document.getElementById('settingsMenu').style.display = 'none');

        // --- 2. SETUP, BEAUTIFUL SKY & SUN ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x4CB4F8); // Brighter blue sky
        scene.fog = new THREE.FogExp2(0x4CB4F8, 0.006); // Smooth distance fade

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        
        // Glowing Sun
        const sunMesh = new THREE.Mesh(new THREE.SphereGeometry(10, 16, 16), new THREE.MeshBasicMaterial({ color: 0xffdd00 }));
        sunMesh.position.set(100, 120, -100);
        scene.add(sunMesh);

        // Sunlight
        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.copy(sunMesh.position);
        sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024; sunLight.shadow.mapSize.height = 1024;
        const d = 80; sunLight.shadow.camera.left = -d; sunLight.shadow.camera.right = d;
        sunLight.shadow.camera.top = d; sunLight.shadow.camera.bottom = -d;
        scene.add(sunLight);

        // Clouds (White boxes floating in the sky)
        const clouds = [];
        const cloudMat = new THREE.MeshLambertMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
        for(let i=0; i<20; i++) {
            const cloud = new THREE.Mesh(new THREE.BoxGeometry(15, 4, 10), cloudMat);
            cloud.position.set(Math.random() * 400 - 200, 50 + Math.random() * 30, Math.random() * 400 - 200);
            scene.add(cloud);
            clouds.push(cloud);
        }

        // --- 3. REALISTIC CAR WITH TURNING WHEELS ---
        const car = new THREE.Group();
        
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff1100, roughness: 0.2, metalness: 0.5 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.6, 4.8), bodyMat);
        body.position.y = 0.6; body.castShadow = true; car.add(body);
        
        const glassMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.1 });
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.6, 2.4), glassMat);
        cabin.position.set(0, 1.2, -0.2); cabin.castShadow = true; car.add(cabin);

        // Wheels Setup
        const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.3, 16);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.9 });
        
        function createWheel(x, z) {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.castShadow = true;
            const pivot = new THREE.Group(); // Pivot helps the wheel turn like a real axle
            pivot.position.set(x, 0.45, z);
            pivot.add(wheel);
            car.add(pivot);
            return pivot;
        }

        // We save the front wheels so we can turn them later in the code
        const frontLeftWheel = createWheel(-1.1, 1.5);
        const frontRightWheel = createWheel(1.1, 1.5);
        createWheel(-1.1, -1.5); // Rear Left
        createWheel(1.1, -1.5);  // Rear Right

        scene.add(car);

        // --- 4. STRICT GRID CITY & DETAILED BUILDINGS ---
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(600, 600), new THREE.MeshStandardMaterial({ color: 0x3d8c40 }));
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);

        const buildingColliders = [];
        const blockSize = 60; // Larger blocks to fit buildings perfectly

        function createHouse(x, z) {
            const houseGroup = new THREE.Group();
            const base = new THREE.Mesh(new THREE.BoxGeometry(12, 10, 12), new THREE.MeshStandardMaterial({ color: 0xf4e3d7 }));
            base.position.y = 5; base.castShadow = true; houseGroup.add(base);
            const roof = new THREE.Mesh(new THREE.ConeGeometry(10, 6, 4), new THREE.MeshStandardMaterial({ color: 0x8B0000 }));
            roof.position.y = 13; roof.rotation.y = Math.PI/4; roof.castShadow = true; houseGroup.add(roof);
            
            houseGroup.position.set(x, 0, z); scene.add(houseGroup);
            buildingColliders.push(new THREE.Box3().setFromObject(houseGroup));
        }

        // Generate City
        for (let x = -240; x <= 240; x += blockSize) {
            for (let z = -240; z <= 240; z += blockSize) {
                // Draw Roads exactly on the grid lines
                const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.9 });
                const roadX = new THREE.Mesh(new THREE.PlaneGeometry(blockSize, 14), roadMat);
                roadX.rotation.x = -Math.PI / 2; roadX.position.set(x + blockSize/2, 0.01, z); scene.add(roadX);
                const roadZ = new THREE.Mesh(new THREE.PlaneGeometry(14, blockSize), roadMat);
                roadZ.rotation.x = -Math.PI / 2; roadZ.position.set(x, 0.02, z + blockSize/2); scene.add(roadZ);

                // Build inside the block center to avoid roads
                const blockCenterX = x + (blockSize / 2);
                const blockCenterZ = z + (blockSize / 2);

                if (Math.abs(blockCenterX) > 20 || Math.abs(blockCenterZ) > 20) {
                    const type = Math.random();
                    if (type < 0.4) {
                        createHouse(blockCenterX, blockCenterZ);
                    } else if (type < 0.7) {
                        const h = Math.random() * 30 + 15;
                        const bldg = new THREE.Mesh(new THREE.BoxGeometry(16, h, 16), new THREE.MeshStandardMaterial({ color: 0x88ccff, metalness: 0.8, roughness: 0.2 }));
                        bldg.position.set(blockCenterX, h/2, blockCenterZ); bldg.castShadow = true; scene.add(bldg);
                        buildingColliders.push(new THREE.Box3().setFromObject(bldg));
                    }
                }
            }
        }

        // --- 5. AI TRAFFIC CARS ---
        const aiCars = [];
        const aiMat = new THREE.MeshStandardMaterial({ color: 0x0000ff }); // Blue cars
        for(let i=0; i<6; i++) {
            const ai = new THREE.Mesh(new THREE.BoxGeometry(2, 1, 4), aiMat);
            // Spawn them on vertical roads
            ai.position.set((Math.floor(Math.random() * 5) * blockSize), 0.5, Math.random() * 200 - 100);
            ai.castShadow = true; scene.add(ai); aiCars.push(ai);
        }

        // --- 6. CONTROLS, CAMERA & PHYSICS ---
        let speed = 0; const maxSpeed = 0.5; const acceleration = 0.01; const friction = 0.98;
        let input = { gas: false, rev: false };
        let steeringAngle = 0; 
        
        // Free Camera Variables
        let cameraOrbitAngle = 0; // The angle you drag to look around
        let isDraggingCamera = false;
        let startDragX = 0;

        // Pedals
        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); input[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); input[key] = false; });
        };
        bindBtn('btnGas', 'gas'); bindBtn('btnRev', 'rev');

        // Steering Wheel
        const steeringArea = document.getElementById('steeringArea');
        const steeringUI = document.getElementById('steeringWheel');
        let isSteering = false;

        steeringArea.addEventListener('touchstart', (e) => { e.preventDefault(); isSteering = true; });
        steeringArea.addEventListener('touchend', (e) => { 
            e.preventDefault(); isSteering = false; steeringAngle = 0; steeringUI.style.transform = `rotate(0deg)`;
        });
        steeringArea.addEventListener('touchmove', (e) => {
            if (!isSteering) return;
            e.preventDefault();
            const touch = e.touches[0]; const rect = steeringArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            let angleDeg = Math.atan2(touch.clientY - centerY, touch.clientX - centerX) * (180 / Math.PI) + 90;
            if (angleDeg > 180) angleDeg -= 360;
            if (angleDeg > 90) angleDeg = 90; if (angleDeg < -90) angleDeg = -90;
            steeringUI.style.transform = `rotate(${angleDeg}deg)`;
            steeringAngle = angleDeg / 90; 
        });

        // Free Camera Touch Logic (Top half of screen)
        const camArea = document.getElementById('cameraArea');
        camArea.addEventListener('touchstart', (e) => { isDraggingCamera = true; startDragX = e.touches[0].clientX; });
        camArea.addEventListener('touchend', () => { isDraggingCamera = false; });
        camArea.addEventListener('touchmove', (e) => {
            if (isDraggingCamera) {
                const deltaX = e.touches[0].clientX - startDragX;
                cameraOrbitAngle += deltaX * 0.005; // Look around speed
                startDragX = e.touches[0].clientX;
            }
        });

        document.getElementById('startBtn').addEventListener('click', () => {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
            try { screen.orientation.lock('landscape'); } catch(e) {}
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
        });

        // --- 7. GAME LOOP ---
        const cameraTarget = new THREE.Vector3();
        const carBox = new THREE.Box3();

        function animate() {
            requestAnimationFrame(animate);
            const oldX = car.position.x; const oldZ = car.position.z;

            // Engine
            if (input.gas) speed += acceleration;
            if (input.rev) speed -= acceleration;
            speed *= friction; 
            if (speed > maxSpeed) speed = maxSpeed;
            if (speed < -maxSpeed / 2) speed = -maxSpeed / 2;

            // Turn Car Body
            car.rotation.y -= (steeringAngle * 0.04) * (speed > 0 ? 1 : -1);

            // ANIMATE 3D TIRES: Tires rotate up to 45 degrees left/right based on the steering wheel!
            frontLeftWheel.rotation.y = -steeringAngle * (Math.PI / 4);
            frontRightWheel.rotation.y = -steeringAngle * (Math.PI / 4);

            car.position.x += Math.sin(car.rotation.y) * speed;
            car.position.z += Math.cos(car.rotation.y) * speed;

            // Move AI Traffic
            aiCars.forEach(ai => {
                ai.position.z += 0.2;
                if (ai.position.z > 240) ai.position.z = -240; // Loop them around
            });

            // Move Clouds
            clouds.forEach(cloud => {
                cloud.position.x += 0.05;
                if (cloud.position.x > 200) cloud.position.x = -200;
            });

            // Collision
            carBox.setFromObject(car); carBox.expandByScalar(-0.2); 
            for (let i = 0; i < buildingColliders.length; i++) {
                if (carBox.intersectsBox(buildingColliders[i])) {
                    car.position.x = oldX - (Math.sin(car.rotation.y) * 0.2);
                    car.position.z = oldZ - (Math.cos(car.rotation.y) * 0.2);
                    speed = 0; break;
                }
            }

            // --- FREE CAMERA SYSTEM ---
            // If the user hits the Gas or Brake, smoothly snap the camera back behind the car
            if ((input.gas || input.rev) && !isDraggingCamera) {
                cameraOrbitAngle *= 0.9; // Smoothly reduces the angle to 0
            }

            const finalCamAngle = car.rotation.y + cameraOrbitAngle;
            const idealOffset = new THREE.Vector3(
                car.position.x - Math.sin(finalCamAngle) * 12,
                car.position.y + 6,
                car.position.z - Math.cos(finalCamAngle) * 12
            );
            
            camera.position.lerp(idealOffset, 0.1);
            cameraTarget.lerp(car.position, 0.2); 
            camera.lookAt(cameraTarget);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
