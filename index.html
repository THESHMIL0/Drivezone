<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Pro City Drift</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; user-select: none; -webkit-user-select: none; font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: none; }
        
        /* Modern HUD UI */
        #uiTop { position: absolute; top: 15px; left: 0; width: 100%; display: none; justify-content: center; gap: 20px; z-index: 60; pointer-events: none; }
        .hud-box { background: rgba(0, 20, 40, 0.85); border: 2px solid #00e5ff; border-radius: 8px; padding: 8px 20px; color: #00e5ff; font-weight: bold; font-size: 20px; font-family: monospace; box-shadow: 0 0 10px rgba(0,229,255,0.3); display: flex; align-items: center; gap: 10px; }
        .hud-box.gold { border-color: #ffc107; color: #ffc107; box-shadow: 0 0 10px rgba(255,193,7,0.3); }
        
        #minimapContainer { position: absolute; top: 15px; left: 15px; z-index: 60; display: none; }
        #minimap { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #00e5ff; background: rgba(0,0,0,0.7); box-shadow: 0 0 15px rgba(0,229,255,0.4); }

        #cameraArea { position: absolute; top: 0; left: 0; width: 100%; height: 50%; z-index: 10; }
        #controls { position: absolute; bottom: 25px; width: 100%; display: none; justify-content: space-between; align-items: flex-end; padding: 0 30px; box-sizing: border-box; z-index: 50; }
        
        /* Realistic Steering Wheel */
        #steeringArea { width: 150px; height: 150px; position: relative; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #steeringWheel { width: 100%; height: 100%; border-radius: 50%; border: 16px solid #1a1a1a; box-sizing: border-box; background: transparent; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.6), inset 0 2px 5px rgba(255,255,255,0.2); transition: transform 0.1s; }
        #steeringWheel::before { content: ''; position: absolute; top: 50%; left: -5px; right: -5px; height: 24px; background: #1a1a1a; transform: translateY(-50%); }
        #steeringWheel::after { content: ''; position: absolute; top: 0; left: 50%; width: 10px; height: 16px; background: #ff0000; transform: translateX(-50%); top: -16px; } /* Red center stripe */
        .horn-center { position: absolute; width: 45px; height: 45px; background: #222; border-radius: 50%; border: 2px solid #000; top: 50%; left: 50%; transform: translate(-50%, -50%); box-shadow: inset 0 2px 5px rgba(255,255,255,0.1); }
        
        /* Sleek Pedals */
        .pedals { display: flex; gap: 15px; position: relative; }
        .btn { width: 75px; height: 75px; border-radius: 12px; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 6px 0 rgba(0,0,0,0.5); user-select: none; }
        .btn:active { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0.5); }
        #btnGas { background: linear-gradient(to bottom, #4facfe, #00f2fe); height: 95px; border: 1px solid #fff; }
        #btnRev { background: linear-gradient(to bottom, #ff5858, #f09819); border: 1px solid #fff; }
        #btnHorn { position: absolute; bottom: 115px; right: 0; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(to bottom, #f6d365, #fda085); border: 2px solid #fff; font-weight: bold; font-size: 12px; display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 0 #cc7a00; color: #000; }
        #btnHorn:active { transform: translateY(6px); box-shadow: none; }

        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #002244, #000); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #startBtn { padding: 15px 40px; font-size: 24px; font-weight: bold; background: #00e5ff; color: #000; border: none; border-radius: 8px; box-shadow: 0 0 20px #00e5ff; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="cameraArea"></div>
    
    <div id="minimapContainer"><canvas id="minimap"></canvas></div>
    <div id="uiTop">
        <div class="hud-box" id="speedDisplay">⚡ 0 KM/H</div>
        <div class="hud-box gold" id="coinDisplay">💰 0</div>
    </div>
    
    <div id="startScreen">
        <h1 style="font-size: 45px; margin: 0; color: #00e5ff; text-shadow: 0 0 15px #00e5ff;">URBAN DRIFT</h1>
        <button id="startBtn">PLAY NOW</button>
    </div>
    
    <div id="controls">
        <div id="steeringArea">
            <div id="steeringWheel"><div class="horn-center"></div></div>
        </div>
        <div class="pedals">
            <div id="btnHorn">HORN</div>
            <div class="btn" id="btnRev">BRAKE</div>
            <div class="btn" id="btnGas">GAS</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xa0e0ff); 
        scene.fog = new THREE.FogExp2(0xa0e0ff, 0.004);
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 0.6); scene.add(hemiLight);
        const sunLight = new THREE.DirectionalLight(0xffffee, 0.9);
        sunLight.position.set(100, 150, -50); sunLight.castShadow = true;
        sunLight.shadow.mapSize.width = 1024; sunLight.shadow.mapSize.height = 1024;
        const d = 100; sunLight.shadow.camera.left = -d; sunLight.shadow.camera.right = d; sunLight.shadow.camera.top = d; sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.bias = -0.0005; scene.add(sunLight);
        // --- CRISP ROAD TEXTURE ---
        function createRoadTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = '#222'; ctx.fillRect(0, 0, 256, 256); 
            ctx.fillStyle = '#fff'; ctx.fillRect(120, 0, 16, 128); 
            const tex = new THREE.CanvasTexture(canvas); 
            tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; 
            tex.magFilter = THREE.NearestFilter; tex.needsUpdate = true; return tex;
        }
        const roadTexture = createRoadTexture(); roadTexture.repeat.set(40, 40);

        // --- SILVER SPORTS CAR W/ BLUE STRIPES ---
        const car = new THREE.Group();
        const chassis = new THREE.Group(); 
        const silverMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, roughness: 0.1, metalness: 0.8 });
        const blueStripeMat = new THREE.MeshStandardMaterial({ color: 0x0044ff, roughness: 0.2, metalness: 0.3 });
        const blackGlass = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.05, metalness: 0.9 });
        
        // Main Body (Sleeker)
        const body = new THREE.Mesh(new THREE.BoxGeometry(2.2, 0.5, 4.6), silverMat); 
        body.position.y = 0.5; body.castShadow = true; chassis.add(body);
        
        // Blue Racing Stripes
        const stripe1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.52, 4.61), blueStripeMat); stripe1.position.set(-0.3, 0.5, 0); chassis.add(stripe1);
        const stripe2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.52, 4.61), blueStripeMat); stripe2.position.set(0.3, 0.5, 0); chassis.add(stripe2);

        // Clean Cabin
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 2.2), blackGlass);
        cabin.position.set(0, 1.0, -0.2); cabin.castShadow = true; chassis.add(cabin);
        const cabinStripe1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.52, 2.21), blueStripeMat); cabinStripe1.position.set(-0.3, 1.0, -0.2); chassis.add(cabinStripe1);
        const cabinStripe2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.52, 2.21), blueStripeMat); cabinStripe2.position.set(0.3, 1.0, -0.2); chassis.add(cabinStripe2);

        // Massive Rear Spoiler
        const spoilerWing = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.1, 0.5), blackGlass); spoilerWing.position.set(0, 1.2, -2.1); chassis.add(spoilerWing);
        const strutL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), blackGlass); strutL.position.set(-0.7, 0.95, -2.1); chassis.add(strutL);
        const strutR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), blackGlass); strutR.position.set(0.7, 0.95, -2.1); chassis.add(strutR);

        // Front Splitter / Bumper
        const splitter = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.1, 0.4), blackGlass); splitter.position.set(0, 0.3, 2.3); chassis.add(splitter);

        window.headLightMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xddffff, emissiveIntensity: 1 });
        const hlLeft = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.1), window.headLightMat); hlLeft.position.set(-0.7, 0.55, 2.3); chassis.add(hlLeft);
        const hlRight = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.1), window.headLightMat); hlRight.position.set(0.7, 0.55, 2.3); chassis.add(hlRight);
        const carLight = new THREE.PointLight(0xffffff, 1, 50); carLight.position.set(0, 1, 3); chassis.add(carLight);
        car.add(chassis); 

        const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 16);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.9 });
        const rimMat = new THREE.MeshStandardMaterial({ color: 0x777, metalness: 0.9 });
        function createWheel(x, z) {
            const pivot = new THREE.Group(); pivot.position.set(x, 0.45, z);
            const wheel = new THREE.Mesh(wheelGeo, wheelMat); wheel.rotation.z = Math.PI / 2; wheel.castShadow = true;
            const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.42, 5), rimMat); rim.rotation.z = Math.PI / 2; // Star shaped rims!
            pivot.add(wheel); pivot.add(rim); car.add(pivot); return pivot;
        }
        const frontLeftWheel = createWheel(-1.1, 1.4); const frontRightWheel = createWheel(1.1, 1.4);
        createWheel(-1.1, -1.4); createWheel(1.1, -1.4);
        scene.add(car);

        // --- MAP ZONES ---
        const colors = { sidewalk: 0xcccccc, sand: 0xe6c27a, ocean: 0x0288d1 };
        const cityGround = new THREE.Mesh(new THREE.PlaneGeometry(280, 400), new THREE.MeshStandardMaterial({ map: roadTexture, roughness: 0.8 }));
        cityGround.rotation.x = -Math.PI / 2; cityGround.position.set(-60, 0, 0); cityGround.receiveShadow = true; scene.add(cityGround);
        const sand = new THREE.Mesh(new THREE.PlaneGeometry(100, 400), new THREE.MeshStandardMaterial({ color: colors.sand, roughness: 1 }));
        sand.rotation.x = -Math.PI / 2; sand.position.set(130, 0.05, 0); sand.receiveShadow = true; scene.add(sand);

        // --- DETAILED BUILDINGS ---
        const buildingColliders = []; const coins = []; const blockSize = 40; 
        
        function spawnCoin(x, z) {
            const coin = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 0.2, 16), new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0x332200, metalness: 1 }));
            coin.rotation.x = Math.PI / 2; coin.position.set(x, 1.5, z); scene.add(coin);
            coins.push({ mesh: coin, hitBox: new THREE.Box3() });
        }

        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.4, 3), new THREE.MeshStandardMaterial({ color: 0x4e342e })); trunk.position.y = 1.5; trunk.castShadow = true; tree.add(trunk);
            const leaves = new THREE.Mesh(new THREE.ConeGeometry(2.5, 5, 6), new THREE.MeshStandardMaterial({ color: 0x2e7d32, flatShading: true })); leaves.position.y = 5; leaves.castShadow = true; tree.add(leaves);
            tree.position.set(x, 0, z); scene.add(tree);
        }

        function createLowPolyBuilding(x, z) {
            const bldgGroup = new THREE.Group();
            const type = Math.floor(Math.random() * 4); 
            
            const sidewalk = new THREE.Mesh(new THREE.BoxGeometry(28, 0.4, 28), new THREE.MeshStandardMaterial({ color: colors.sidewalk })); 
            sidewalk.position.y = 0.2; sidewalk.receiveShadow = true; bldgGroup.add(sidewalk);

            let hitW = 16, hitD = 16;
            
            if (type === 0) { 
                // Pizza / Cafe
                const body = new THREE.Mesh(new THREE.BoxGeometry(16, 8, 16), new THREE.MeshStandardMaterial({ color: 0xDEB887 })); body.position.y = 4; body.castShadow = true; bldgGroup.add(body);
                const awning = new THREE.Mesh(new THREE.BoxGeometry(17, 0.5, 4), new THREE.MeshStandardMaterial({ color: 0x4CAF50 })); awning.position.set(0, 5, 8.5); awning.rotation.x = -Math.PI/6; awning.castShadow = true; bldgGroup.add(awning);
            } else if (type === 1) {
                // Tall Apartment
                const height = 25; const body = new THREE.Mesh(new THREE.BoxGeometry(14, height, 14), new THREE.MeshStandardMaterial({ color: 0xe0e0e0 })); body.position.y = height/2; body.castShadow = true; bldgGroup.add(body);
                for(let i=5; i<height; i+=5) { const balc = new THREE.Mesh(new THREE.BoxGeometry(10, 1, 2), new THREE.MeshStandardMaterial({ color: 0x555 })); balc.position.set(0, i, 7.5); bldgGroup.add(balc); }
            } else if (type === 2) {
                // Hospital
                const body = new THREE.Mesh(new THREE.BoxGeometry(18, 14, 14), new THREE.MeshStandardMaterial({ color: 0xffffff })); body.position.y = 7; body.castShadow = true; bldgGroup.add(body);
                const stripe = new THREE.Mesh(new THREE.BoxGeometry(18.2, 1.5, 14.2), new THREE.MeshStandardMaterial({ color: 0xe53935 })); stripe.position.y = 10; bldgGroup.add(stripe);
                hitW = 18;
            } else {
                // Bank
                const base = new THREE.Mesh(new THREE.BoxGeometry(16, 10, 12), new THREE.MeshStandardMaterial({ color: 0x90A4AE })); base.position.set(0, 5, -2); base.castShadow = true; bldgGroup.add(base);
                const roof = new THREE.Mesh(new THREE.ConeGeometry(12, 6, 4), new THREE.MeshStandardMaterial({ color: 0x3E2723 })); roof.position.set(0, 13, 0); roof.rotation.y = Math.PI/4; roof.castShadow = true; bldgGroup.add(roof);
                for(let p=-6; p<=6; p+=4) { const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 10), new THREE.MeshStandardMaterial({ color: 0xfff })); pillar.position.set(p, 5, 5); bldgGroup.add(pillar); }
            }

            bldgGroup.rotation.y = (Math.floor(Math.random() * 4)) * (Math.PI / 2); bldgGroup.position.set(x, 0, z); scene.add(bldgGroup);
            
            // Hitbox covers walls only
            const hitBox = new THREE.Box3(); hitBox.setFromCenterAndSize(new THREE.Vector3(x, 5, z), new THREE.Vector3(hitW, 20, hitD));
            buildingColliders.push(hitBox);

            if (Math.random() > 0.6) createTree(x + 12, z + 12);
            if (Math.random() > 0.5) spawnCoin(x + blockSize/2, z);
        }

        for (let x = -120; x <= 120; x += blockSize) {
            for (let z = -120; z <= 120; z += blockSize) {
                if (Math.abs(x) > 10 || Math.abs(z) > 10) createLowPolyBuilding(x, z);
            }
        }
        // --- CONTROLS, PARTICLES & LOGIC ---
        let speed = 0, score = 0, acceleration = 0.02, steeringAngle = 0, cameraOrbitAngle = 0, isDraggingCamera = false, startDragX = 0;
        let input = { gas: false, rev: false, horn: false }; 
        const particles = []; const smokeGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3); const smokeMat = new THREE.MeshLambertMaterial({ color: 0x999999, transparent: true, opacity: 0.8 });
        
        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); input[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); input[key] = false; });
        };
        bindBtn('btnGas', 'gas'); bindBtn('btnRev', 'rev'); bindBtn('btnHorn', 'horn');

        const steeringArea = document.getElementById('steeringArea'); const steeringUI = document.getElementById('steeringWheel');
        let isSteering = false;
        steeringArea.addEventListener('touchstart', (e) => { e.preventDefault(); isSteering = true; });
        steeringArea.addEventListener('touchend', (e) => { e.preventDefault(); isSteering = false; steeringAngle = 0; steeringUI.style.transform = `rotate(0deg)`; });
        steeringArea.addEventListener('touchmove', (e) => {
            if (!isSteering) return; e.preventDefault();
            const touch = e.touches[0]; const rect = steeringArea.getBoundingClientRect();
            let angleDeg = Math.atan2(touch.clientY - (rect.top + rect.height/2), touch.clientX - (rect.left + rect.width/2)) * (180 / Math.PI) + 90;
            if (angleDeg > 180) angleDeg -= 360; if (angleDeg > 90) angleDeg = 90; if (angleDeg < -90) angleDeg = -90;
            steeringUI.style.transform = `rotate(${angleDeg}deg)`; steeringAngle = angleDeg / 90; 
        });

        const camArea = document.getElementById('cameraArea');
        camArea.addEventListener('touchstart', (e) => { isDraggingCamera = true; startDragX = e.touches[0].clientX; });
        camArea.addEventListener('touchend', () => { isDraggingCamera = false; });
        camArea.addEventListener('touchmove', (e) => { if (isDraggingCamera) { cameraOrbitAngle += (e.touches[0].clientX - startDragX) * 0.005; startDragX = e.touches[0].clientX; } });

        document.getElementById('startBtn').addEventListener('click', () => {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
            try { screen.orientation.lock('landscape'); } catch(e) {}
            document.getElementById('startScreen').style.display = 'none'; 
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('uiTop').style.display = 'flex';
            document.getElementById('minimapContainer').style.display = 'block';
        });

        const mapCanvas = document.getElementById('minimap'); const ctx = mapCanvas.getContext('2d');
        function updateMinimap() {
            ctx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
            ctx.fillStyle = '#00e5ff'; ctx.beginPath(); ctx.arc(55, 55, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#777';
            for (let x = -120; x <= 120; x += blockSize) {
                for (let z = -120; z <= 120; z += blockSize) {
                    const relX = (x - car.position.x) * 0.3 + 55; const relZ = (z - car.position.z) * 0.3 + 55;
                    if(relX > 0 && relX < 110 && relZ > 0 && relZ < 110) ctx.fillRect(relX - 4, relZ - 4, 8, 8);
                }
            }
        }

        // --- GAME LOOP ---
        const cameraTarget = new THREE.Vector3(); const carBox = new THREE.Box3();
        function animate() {
            requestAnimationFrame(animate);
            const oldX = car.position.x; const oldZ = car.position.z;

            let cMaxSpeed = 0.8; let cFric = 0.96;
            if (car.position.x > 80) { cMaxSpeed = 0.3; cFric = 0.93; smokeMat.color.setHex(colors.sand); } 
            else { smokeMat.color.setHex(0x999999); }

            if (input.gas) speed += acceleration; if (input.rev) speed -= acceleration;
            speed *= cFric; if (speed > cMaxSpeed) speed = cMaxSpeed; if (speed < -cMaxSpeed / 2) speed = -cMaxSpeed / 2;

            frontLeftWheel.rotation.y = -steeringAngle * (Math.PI / 4); frontRightWheel.rotation.y = -steeringAngle * (Math.PI / 4);
            if (Math.abs(speed) > 0.005) car.rotation.y -= (steeringAngle * 0.06) * (speed > 0 ? 1 : -1);

            car.position.x += Math.sin(car.rotation.y) * speed; car.position.z += Math.cos(car.rotation.y) * speed;

            document.getElementById('speedDisplay').innerText = `⚡ ${Math.abs(speed) > 0.01 ? Math.abs(Math.round((speed / cMaxSpeed) * 180)) : 0} KM/H`;
            updateMinimap();

            chassis.rotation.z += (steeringAngle * (speed / cMaxSpeed) * 0.15 - chassis.rotation.z) * 0.1;
            chassis.rotation.x += ((input.gas ? -0.05 : input.rev ? 0.05 : 0) - chassis.rotation.x) * 0.1;
            if (input.horn) { chassis.position.y = Math.random() * 0.05; window.headLightMat.emissive.setHex(0xffaa00); } 
            else { chassis.position.y = 0; window.headLightMat.emissive.setHex(0xddffff); }

            if (Math.abs(speed) > 0.05 && Math.random() > 0.5) {
                const smoke = new THREE.Mesh(smokeGeo, smokeMat.clone()); smoke.position.set(car.position.x - Math.sin(car.rotation.y)*2.4, 0.4, car.position.z - Math.cos(car.rotation.y)*2.4);
                scene.add(smoke); particles.push({ mesh: smoke, life: 1.0 });
            }
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.life -= 0.03; p.mesh.position.y += 0.04; p.mesh.scale.setScalar(p.life); p.mesh.material.opacity = p.life;
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

            carBox.setFromObject(car); carBox.expandByScalar(-0.1); 
            for(let i = coins.length - 1; i >= 0; i--) {
                let c = coins[i]; c.mesh.rotation.y += 0.05; c.hitBox.setFromObject(c.mesh);
                if (carBox.intersectsBox(c.hitBox)) { scene.remove(c.mesh); coins.splice(i, 1); score++; document.getElementById('coinDisplay').innerText = `💰 ${score}`; }
            }

            for (let i = 0; i < buildingColliders.length; i++) {
                if (carBox.intersectsBox(buildingColliders[i])) {
                    car.position.x = oldX - (Math.sin(car.rotation.y) * 0.2); car.position.z = oldZ - (Math.cos(car.rotation.y) * 0.2); speed = 0; break;
                }
            }

            if ((input.gas || input.rev) && !isDraggingCamera) cameraOrbitAngle *= 0.9; 
            const finalCamAngle = car.rotation.y + cameraOrbitAngle;
            const idealOffset = new THREE.Vector3(car.position.x - Math.sin(finalCamAngle)*9, car.position.y + 4.5, car.position.z - Math.cos(finalCamAngle)*9);
            camera.position.lerp(idealOffset, 0.15); cameraTarget.lerp(car.position, 0.25); camera.lookAt(cameraTarget);
            
            sunLight.position.set(car.position.x + 50, 100, car.position.z - 50); sunLight.target = car;
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
