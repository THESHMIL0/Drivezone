<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High Detail Mobile Village Driving</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background-color: #87CEEB; 
            user-select: none; -webkit-user-select: none;
            font-family: sans-serif;
        }
        #startBtn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px 40px; font-size: 24px; font-weight: bold;
            background: #28a745; color: white; border: none; border-radius: 10px; z-index: 100;
        }
        #controls { 
            position: absolute; bottom: 20px; width: 100%; display: none; 
            justify-content: space-between; padding: 0 20px; box-sizing: border-box;
        }
        .control-group { display: flex; gap: 15px; }
        .btn { 
            width: 70px; height: 70px; border-radius: 50%; 
            background: rgba(255, 255, 255, 0.7); border: 3px solid #333; 
            font-size: 14px; font-weight: bold; display: flex; align-items: center; 
            justify-content: center; touch-action: none;
        }
        #btnGas { background: rgba(40, 167, 69, 0.8); color: white; }
        #btnRev { background: rgba(220, 53, 69, 0.8); color: white; }
    </style>
</head>
<body>

    <button id="startBtn">Tap to Play (Landscape)</button>

    <div id="controls">
        <div class="control-group">
            <div class="btn" id="btnLeft">LEFT</div>
            <div class="btn" id="btnRight">RIGHT</div>
        </div>
        <div class="control-group">
            <div class="btn" id="btnRev">BRAKE</div>
            <div class="btn" id="btnGas">GAS</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        // --- 1. SETUP & HIGH DETAIL GRAPHICS ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x60a3ff); // Richer sky blue
        scene.fog = new THREE.FogExp2(0x60a3ff, 0.015); // Adds fog for distance depth

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Turn on shadows!
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Soft shadow edges
        document.body.appendChild(renderer.domElement);

        // --- LIGHTING (The Sun) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
        sunLight.position.set(50, 100, 50);
        sunLight.castShadow = true; // Sun casts shadows
        sunLight.shadow.mapSize.width = 1024; // High res shadows
        sunLight.shadow.mapSize.height = 1024;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 250;
        sunLight.shadow.camera.left = -100;
        sunLight.shadow.camera.right = 100;
        sunLight.shadow.camera.top = 100;
        sunLight.shadow.camera.bottom = -100;
        scene.add(sunLight);

        // --- 2. THE CAR (With Shadows) ---
        const car = new THREE.Group();
        
        // High-detail Standard Material reacts to light
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xcc0000, roughness: 0.2, metalness: 0.5 });
        const bodyGeo = new THREE.BoxGeometry(2, 0.5, 4);
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.5;
        body.castShadow = true; // Car casts shadow
        car.add(body);

        const roofMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1 });
        const roofGeo = new THREE.BoxGeometry(1.5, 0.5, 2);
        const roof = new THREE.Mesh(roofGeo, roofMat);
        roof.position.set(0, 1, -0.5);
        roof.castShadow = true;
        car.add(roof);

        scene.add(car);

        // --- 3. GENERATE THE VILLAGE ---
        // The Ground
        const groundGeo = new THREE.PlaneGeometry(300, 300);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57 }); // Sea green grass
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true; // Ground receives shadows
        scene.add(ground);

        // Building Materials (A few different colors)
        const buildingColors = [0xdddddd, 0xb0c4de, 0xf5deb3, 0xd3d3d3];
        
        // Loop to build a city grid
        const blockSize = 30; // Distance between intersections
        for (let x = -120; x <= 120; x += blockSize) {
            for (let z = -120; z <= 120; z += blockSize) {
                
                // Add a Road Plane at this block
                const roadGeo = new THREE.PlaneGeometry(blockSize, 8);
                const roadMat = new THREE.MeshStandardMaterial({ color: 0x333333 }); // Dark Asphalt
                
                // Horizontal road
                const roadX = new THREE.Mesh(roadGeo, roadMat);
                roadX.rotation.x = -Math.PI / 2;
                roadX.position.set(x, 0.01, z); // Slightly above ground to prevent glitching
                roadX.receiveShadow = true;
                scene.add(roadX);

                // Vertical road
                const roadZ = new THREE.Mesh(roadGeo, roadMat);
                roadZ.rotation.x = -Math.PI / 2;
                roadZ.rotation.z = Math.PI / 2;
                roadZ.position.set(x, 0.02, z); 
                roadZ.receiveShadow = true;
                scene.add(roadZ);

                // Don't build a house exactly where the car spawns (0,0)
                if (Math.abs(x) > 10 || Math.abs(z) > 10) {
                    // Create a random building in the corner of the block
                    const bHeight = Math.random() * 15 + 5; // Height between 5 and 20
                    const bWidth = Math.random() * 10 + 8;
                    const bColor = buildingColors[Math.floor(Math.random() * buildingColors.length)];
                    
                    const bGeo = new THREE.BoxGeometry(bWidth, bHeight, bWidth);
                    const bMat = new THREE.MeshStandardMaterial({ color: bColor, roughness: 0.8 });
                    const building = new THREE.Mesh(bGeo, bMat);
                    
                    // Position it off-center from the roads
                    building.position.set(x + 10, bHeight / 2, z + 10);
                    building.castShadow = true;
                    building.receiveShadow = true;
                    scene.add(building);
                }
            }
        }

        // --- 4. IMPROVED SMOOTH PHYSICS ---
        let speed = 0;
        let steeringAngle = 0;
        const maxSpeed = 0.6;
        const acceleration = 0.015;
        const friction = 0.96; // Multiplier to glide to a stop smoothly
        const turnSpeed = 0.05;

        let input = { gas: false, rev: false, left: false, right: false };

        // Touch Controls Binding
        function bindBtn(id, key) {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); input[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); input[key] = false; });
        }
        bindBtn('btnGas', 'gas'); bindBtn('btnRev', 'rev');
        bindBtn('btnLeft', 'left'); bindBtn('btnRight', 'right');

        // Fullscreen
        document.getElementById('startBtn').addEventListener('click', () => {
            document.documentElement.requestFullscreen().catch(err => console.log(err));
            try { screen.orientation.lock('landscape'); } catch(e) {}
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('controls').style.display = 'flex';
        });

        // --- 5. GAME LOOP & CHASE CAMERA ---
        // We create a "dummy" object for the camera to smoothly follow
        const cameraTarget = new THREE.Vector3();

        function animate() {
            requestAnimationFrame(animate);

            // Engine power
            if (input.gas) speed += acceleration;
            if (input.rev) speed -= acceleration;
            
            // Friction (Smooth slowing down)
            speed *= friction; 
            
            // Limit speed
            if (speed > maxSpeed) speed = maxSpeed;
            if (speed < -maxSpeed / 2) speed = -maxSpeed / 2;

            // Smooth Steering
            if (input.left) steeringAngle += turnSpeed;
            if (input.right) steeringAngle -= turnSpeed;
            
            // Auto-center the steering wheel when letting go
            if (!input.left && !input.right) steeringAngle *= 0.8; 
            
            // Clamp steering
            if (steeringAngle > 0.05) steeringAngle = 0.05;
            if (steeringAngle < -0.05) steeringAngle = -0.05;

            // Turn the car based on speed AND steering angle (realistic)
            car.rotation.y += steeringAngle * speed * 10;

            // Move Car
            car.position.x += Math.sin(car.rotation.y) * speed;
            car.position.z += Math.cos(car.rotation.y) * speed;

            // Smooth "Chase" Camera Math
            // 1. Calculate where the camera *should* be (behind and above the car)
            const idealCameraOffset = new THREE.Vector3(
                car.position.x - Math.sin(car.rotation.y) * 10,
                car.position.y + 5,
                car.position.z - Math.cos(car.rotation.y) * 10
            );
            // 2. Smoothly glide the actual camera to that ideal position (Lerp)
            camera.position.lerp(idealCameraOffset, 0.1);

            // 3. Make the camera smoothly look at the car
            cameraTarget.lerp(car.position, 0.2);
            camera.lookAt(cameraTarget);

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
