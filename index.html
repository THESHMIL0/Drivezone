<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Urban Drift Optimized</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; user-select: none; -webkit-user-select: none; font-family: 'Segoe UI', Tahoma, sans-serif; touch-action: none; }
        #uiTop { position: absolute; top: 15px; left: 15px; width: calc(100% - 30px); display: none; justify-content: space-between; align-items: flex-start; z-index: 60; pointer-events: none; }
        .hud-left { display: flex; flex-direction: column; gap: 10px; }
        #minimap { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #00e5ff; background: rgba(0,10,20,0.8); box-shadow: 0 0 10px rgba(0,229,255,0.3); backdrop-filter: blur(3px); }
        .hud-panel { background: rgba(0, 20, 40, 0.85); border: 2px solid #00e5ff; border-radius: 12px; padding: 5px 15px; color: #fff; font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 8px; }
        .hud-panel.gold { border-color: #ffc107; }
        .hud-value { color: #fff; font-family: monospace; font-size: 22px; text-shadow: 0 0 5px currentColor; }
        #cameraArea { position: absolute; top: 0; left: 0; width: 100%; height: 50%; z-index: 10; }
        #controls { position: absolute; bottom: 25px; width: 100%; display: none; justify-content: space-between; align-items: flex-end; padding: 0 30px; box-sizing: border-box; z-index: 50; }
        #steeringArea { width: 150px; height: 150px; position: relative; display: flex; align-items: center; justify-content: center; touch-action: none; }
        #steeringWheel { width: 100%; height: 100%; border-radius: 50%; border: 16px solid #111; box-sizing: border-box; background: transparent; position: relative; box-shadow: 0 10px 20px rgba(0,0,0,0.7), inset 0 2px 8px rgba(255,255,255,0.1); transition: transform 0.1s; }
        #steeringWheel::before { content: ''; position: absolute; top: 50%; left: -5px; right: -5px; height: 26px; background: #111; transform: translateY(-50%); }
        #steeringWheel::after { content: ''; position: absolute; top: 0; left: 50%; width: 12px; height: 16px; background: #ff3333; transform: translateX(-50%); top: -16px; } 
        .horn-center { position: absolute; width: 50px; height: 50px; background: #222; border-radius: 50%; border: 2px solid #000; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .pedals { display: flex; gap: 15px; position: relative; }
        .btn { width: 75px; height: 75px; border-radius: 12px; font-size: 15px; font-weight: 900; display: flex; align-items: center; justify-content: center; color: white; box-shadow: 0 8px 0 rgba(0,0,0,0.6); user-select: none; border: 2px solid rgba(255,255,255,0.2); }
        .btn:active { transform: translateY(8px); box-shadow: none; }
        #btnGas { background: linear-gradient(to bottom, #00c6ff, #0072ff); height: 100px; }
        #btnRev { background: linear-gradient(to bottom, #ff512f, #dd2476); }
        #btnHorn { position: absolute; bottom: 120px; right: 0; width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(to bottom, #f6d365, #fda085); font-weight: bold; font-size: 12px; display: flex; justify-content: center; align-items: center; box-shadow: 0 6px 0 #b33900; color: #000; border: 2px solid #fff; }
        #btnHorn:active { transform: translateY(6px); box-shadow: none; }
        #startScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #001122, #000); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; }
        #startBtn { padding: 15px 50px; font-size: 26px; font-weight: 900; background: linear-gradient(135deg, #00e5ff, #0072ff); color: #fff; border: none; border-radius: 8px; box-shadow: 0 0 20px rgba(0,229,255,0.4); margin-top: 20px; }
        #settingsBtn { position: absolute; top: 15px; right: 15px; width: 45px; height: 45px; border-radius: 50%; background: rgba(255,255,255,0.9); border: 2px solid #333; font-size: 22px; display: flex; align-items: center; justify-content: center; z-index: 100; pointer-events: auto; }
    </style>
</head>
<body>
    <div id="cameraArea"></div>
    <div id="uiTop">
        <div class="hud-left">
            <div id="minimapContainer"><canvas id="minimap" width="110" height="110"></canvas></div>
            <div class="hud-panel gold">💰 <span class="hud-value" style="color:#ffc107;" id="coinDisplay">0</span></div>
        </div>
        <div class="hud-panel">⚡ <span class="hud-value" style="color:#00e5ff;" id="speedDisplay">0</span> KM/H</div>
    </div>
    <div id="startScreen">
        <h1 style="font-size: 50px; margin: 0; color: #fff; text-shadow: 0 0 20px #00e5ff;">URBAN DRIFT</h1>
        <p style="color: #aaa; margin-bottom: 30px;">Optimized for Mobile</p>
        <button id="startBtn">START ENGINE</button>
    </div>
    <div id="settingsBtn">⚙️</div>
    <div id="controls">
        <div id="steeringArea"><div id="steeringWheel"><div class="horn-center"></div></div></div>
        <div class="pedals">
            <div id="btnHorn">HORN</div>
            <div class="btn" id="btnRev">BRAKE</div>
            <div class="btn" id="btnGas">GAS</div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x7ec0ee); 
        scene.fog = new THREE.FogExp2(0x7ec0ee, 0.0035); 
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 800);
        
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        
        // LAG FIX #1: Cap pixel ratio to save massive GPU power on Retina mobile screens
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.2)); 
        
        renderer.shadowMap.enabled = true; 
        renderer.shadowMap.type = THREE.PCFShadowMap; // Cheaper shadows
        renderer.outputEncoding = THREE.sRGBEncoding; 
        document.body.appendChild(renderer.domElement);

        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444455, 0.7); scene.add(hemiLight);
        const sunLight = new THREE.DirectionalLight(0xfff5e6, 1.0);
        sunLight.position.set(100, 150, -50); sunLight.castShadow = true;
        // LAG FIX #2: Lower shadow map resolution slightly
        sunLight.shadow.mapSize.width = 1024; sunLight.shadow.mapSize.height = 1024; 
        const d = 100; sunLight.shadow.camera.left = -d; sunLight.shadow.camera.right = d; sunLight.shadow.camera.top = d; sunLight.shadow.camera.bottom = -d;
        sunLight.shadow.bias = -0.001; scene.add(sunLight);
        // --- CRISP TEXTURES ---
        function createRoadTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, 256, 256); 
            for(let i=0; i<1500; i++) { ctx.fillStyle = Math.random() > 0.5 ? '#222' : '#111'; ctx.fillRect(Math.random()*256, Math.random()*256, 3, 3); }
            ctx.fillStyle = '#ffffff'; for(let i=0; i<256; i+=40) ctx.fillRect(123, i, 10, 20); 
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.magFilter = THREE.NearestFilter; return tex;
        }
        function createWindowTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = '#0a1015'; ctx.fillRect(0, 0, 128, 128); 
            for(let x=5; x<128; x+=20) { for(let y=5; y<128; y+=25) { ctx.fillStyle = Math.random() > 0.6 ? '#ffeba1' : '#112233'; ctx.fillRect(x, y, 10, 15); } }
            const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.magFilter = THREE.NearestFilter; return tex;
        }
        const roadTexture = createRoadTexture(); roadTexture.repeat.set(40, 40);
        const windowTexture = createWindowTexture(); windowTexture.repeat.set(2, 4);

        // --- PLAYER CAR (Keep High Detail) ---
        const car = new THREE.Group(); const chassis = new THREE.Group(); 
        const silverPaint = new THREE.MeshPhysicalMaterial({ color: 0xdddddd, metalness: 0.6, roughness: 0.2, clearcoat: 0.8 });
        const blueStripeMat = new THREE.MeshPhysicalMaterial({ color: 0x0044ff, metalness: 0.5, roughness: 0.3 });
        const glassMat = new THREE.MeshPhysicalMaterial({ color: 0x000000, metalness: 0.9, roughness: 0.1, transparent: true, opacity: 0.9 });
        
        const body = new THREE.Mesh(new THREE.BoxGeometry(2.3, 0.5, 4.6), silverPaint); body.position.y = 0.5; body.castShadow = true; chassis.add(body);
        const stripe1 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.52, 4.61), blueStripeMat); stripe1.position.set(-0.35, 0.5, 0); chassis.add(stripe1);
        const stripe2 = new THREE.Mesh(new THREE.BoxGeometry(0.3, 0.52, 4.61), blueStripeMat); stripe2.position.set(0.35, 0.5, 0); chassis.add(stripe2);
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.8, 0.5, 2.2), glassMat); cabin.position.set(0, 1.0, -0.2); cabin.castShadow = true; chassis.add(cabin);
        const spoilerWing = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.1, 0.5), new THREE.MeshStandardMaterial({color: 0x111})); spoilerWing.position.set(0, 1.25, -2.1); chassis.add(spoilerWing);
        const strutL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), silverPaint); strutL.position.set(-0.7, 1.0, -2.1); chassis.add(strutL);
        const strutR = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.4, 0.1), silverPaint); strutR.position.set(0.7, 1.0, -2.1); chassis.add(strutR);
        const splitter = new THREE.Mesh(new THREE.BoxGeometry(2.4, 0.1, 0.4), new THREE.MeshStandardMaterial({color: 0x111})); splitter.position.set(0, 0.25, 2.3); chassis.add(splitter);

        window.headLightMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xddffff, emissiveIntensity: 2 });
        const hlLeft = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.1), window.headLightMat); hlLeft.position.set(-0.7, 0.55, 2.3); chassis.add(hlLeft);
        const hlRight = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.1), window.headLightMat); hlRight.position.set(0.7, 0.55, 2.3); chassis.add(hlRight);
        
        car.add(chassis); 

        const wheelGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.4, 12); // Less geometry for speed
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.9 });
        function createWheel(x, z) {
            const pivot = new THREE.Group(); pivot.position.set(x, 0.45, z);
            const wheel = new THREE.Mesh(wheelGeo, wheelMat); wheel.rotation.z = Math.PI / 2;
            const rim = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.42, 6), new THREE.MeshStandardMaterial({ color: 0x888 })); rim.rotation.z = Math.PI / 2; 
            pivot.add(wheel); pivot.add(rim); car.add(pivot); return pivot;
        }
        const frontLeftWheel = createWheel(-1.15, 1.4); const frontRightWheel = createWheel(1.15, 1.4);
        createWheel(-1.15, -1.4); createWheel(1.15, -1.4); scene.add(car);

        // --- MAP ZONES ---
        // LAG FIX #3: Use MeshLambertMaterial (10x faster than Standard) for the environment!
        const cityGround = new THREE.Mesh(new THREE.PlaneGeometry(280, 400), new THREE.MeshLambertMaterial({ map: roadTexture }));
        cityGround.rotation.x = -Math.PI / 2; cityGround.position.set(-60, 0, 0); cityGround.receiveShadow = true; scene.add(cityGround);
        const sand = new THREE.Mesh(new THREE.PlaneGeometry(100, 400), new THREE.MeshLambertMaterial({ color: 0xe6c27a }));
        sand.rotation.x = -Math.PI / 2; sand.position.set(130, 0.05, 0); scene.add(sand);
        const ocean = new THREE.Mesh(new THREE.PlaneGeometry(200, 400), new THREE.MeshLambertMaterial({ color: 0x0288d1 }));
        ocean.rotation.x = -Math.PI / 2; ocean.position.set(280, -0.3, 0); scene.add(ocean);

        // --- FAST PROCEDURAL CITY ---
        const buildingColliders = []; const coins = []; const blockSize = 45; 
        
        // Pre-create materials for performance
        const matSidewalk = new THREE.MeshLambertMaterial({ color: 0xdddddd });
        const matTreeTrunk = new THREE.MeshLambertMaterial({ color: 0x4e342e });
        const matTreeLeaves = new THREE.MeshLambertMaterial({ color: 0x2e7d32, flatShading: true });
        const matGold = new THREE.MeshLambertMaterial({ color: 0xffd700, emissive: 0x554400 });
        const matCafe = new THREE.MeshLambertMaterial({ color: 0xDEB887 });
        const matAwn = new THREE.MeshLambertMaterial({ color: 0x4CAF50 });
        const matApt = new THREE.MeshLambertMaterial({ color: 0xe0e0e0 });
        const matHosp = new THREE.MeshLambertMaterial({ color: 0xffffff });
        const matSky = new THREE.MeshLambertMaterial({ map: windowTexture });

        function spawnCoin(x, z) {
            const coin = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 0.2, 10), matGold);
            coin.rotation.x = Math.PI / 2; coin.position.set(x, 1.5, z); scene.add(coin);
            coins.push({ mesh: coin, hitBox: new THREE.Box3() });
        }

        function createTree(x, z) {
            const tree = new THREE.Group();
            const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.4, 3), matTreeTrunk); trunk.position.y = 1.5; tree.add(trunk);
            const leaves = new THREE.Mesh(new THREE.DodecahedronGeometry(2.5, 0), matTreeLeaves); leaves.position.y = 4; leaves.scale.y = 1.5; tree.add(leaves);
            tree.position.set(x, 0, z); scene.add(tree);
        }

        function createLowPolyBuilding(x, z) {
            const bldgGroup = new THREE.Group();
            const type = Math.floor(Math.random() * 4); 
            const sidewalk = new THREE.Mesh(new THREE.BoxGeometry(32, 0.4, 32), matSidewalk); 
            sidewalk.position.y = 0.2; sidewalk.receiveShadow = true; bldgGroup.add(sidewalk);

            let hitW = 16, hitD = 16;
            if (type === 0) { 
                const body = new THREE.Mesh(new THREE.BoxGeometry(16, 8, 16), matCafe); body.position.y = 4; body.castShadow = true; bldgGroup.add(body);
                const awning = new THREE.Mesh(new THREE.BoxGeometry(17, 0.5, 4), matAwn); awning.position.set(0, 5, 8.5); awning.rotation.x = -Math.PI/6; bldgGroup.add(awning);
            } else if (type === 1) {
                const height = 25; const body = new THREE.Mesh(new THREE.BoxGeometry(14, height, 14), matApt); body.position.y = height/2; body.castShadow = true; bldgGroup.add(body);
                const tower = new THREE.Mesh(new THREE.CylinderGeometry(2, 2, 4, 8), matTreeTrunk); tower.position.set(3, height + 2, -3); bldgGroup.add(tower);
            } else if (type === 2) {
                const body = new THREE.Mesh(new THREE.BoxGeometry(18, 14, 14), matHosp); body.position.y = 7; body.castShadow = true; bldgGroup.add(body);
                const cross = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 0.5), new THREE.MeshLambertMaterial({ color: 0xff0000 })); cross.position.set(0, 14, 7.1); bldgGroup.add(cross);
                hitW = 18;
            } else {
                const body = new THREE.Mesh(new THREE.BoxGeometry(14, 30, 14), matSky); body.position.y = 15; body.castShadow = true; bldgGroup.add(body);
            }

            bldgGroup.rotation.y = (Math.floor(Math.random() * 4)) * (Math.PI / 2); bldgGroup.position.set(x, 0, z); scene.add(bldgGroup);
            buildingColliders.push(new THREE.Box3().setFromCenterAndSize(new THREE.Vector3(x, 5, z), new THREE.Vector3(hitW, 30, hitD)));

            if (Math.random() > 0.5) createTree(x + 15, z + 15);
            if (Math.random() > 0.6) spawnCoin(x + blockSize/2, z);
        }

        for (let x = -135; x <= 135; x += blockSize) {
            for (let z = -135; z <= 135; z += blockSize) {
                if (Math.abs(x) > 15 || Math.abs(z) > 15) createLowPolyBuilding(x, z);
            }
        }
        // --- CONTROLS & OPTIMIZED PARTICLES ---
        let speed = 0, score = 0, acceleration = 0.025, steeringAngle = 0, cameraOrbitAngle = 0, isDraggingCamera = false, startDragX = 0;
        let input = { gas: false, rev: false, horn: false }; 
        const particles = []; const smokeGeo = new THREE.BoxGeometry(0.3, 0.3, 0.3); const smokeMat = new THREE.MeshBasicMaterial({ color: 0x999999, transparent: true, opacity: 0.8 });
        
        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); input[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); input[key] = false; });
        };
        bindBtn('btnGas', 'gas'); bindBtn('btnRev', 'rev'); bindBtn('btnHorn', 'horn');

        const steeringArea = document.getElementById('steeringArea'); const steeringUI = document.getElementById('steeringWheel');
        let isSteering = false;
        steeringArea.addEventListener('touchstart', (e) => { e.preventDefault(); isSteering = true; });
        steeringArea.addEventListener('touchend', (e) => { e.preventDefault(); isSteering = false; steeringAngle = 0; steeringUI.style.transform = `rotate(0deg)`; });
        steeringArea.addEventListener('touchmove', (e) => {
            if (!isSteering) return; e.preventDefault();
            const touch = e.touches[0]; const rect = steeringArea.getBoundingClientRect();
            let angleDeg = Math.atan2(touch.clientY - (rect.top + rect.height/2), touch.clientX - (rect.left + rect.width/2)) * (180 / Math.PI) + 90;
            if (angleDeg > 180) angleDeg -= 360; if (angleDeg > 90) angleDeg = 90; if (angleDeg < -90) angleDeg = -90;
            steeringUI.style.transform = `rotate(${angleDeg}deg)`; steeringAngle = angleDeg / 90; 
        });

        const camArea = document.getElementById('cameraArea');
        camArea.addEventListener('touchstart', (e) => { isDraggingCamera = true; startDragX = e.touches[0].clientX; });
        camArea.addEventListener('touchend', () => { isDraggingCamera = false; });
        camArea.addEventListener('touchmove', (e) => { if (isDraggingCamera) { cameraOrbitAngle += (e.touches[0].clientX - startDragX) * 0.005; startDragX = e.touches[0].clientX; } });

        document.getElementById('startBtn').addEventListener('click', () => {
            document.documentElement.requestFullscreen().catch(e => console.log(e));
            try { screen.orientation.lock('landscape'); } catch(e) {}
            document.getElementById('startScreen').style.display = 'none'; 
            document.getElementById('controls').style.display = 'flex';
            document.getElementById('uiTop').style.display = 'flex';
        });

        // LAG FIX #4: Optimized Minimap logic (Only draws buildings near you)
        const mapCanvas = document.getElementById('minimap'); const ctx = mapCanvas.getContext('2d');
        function updateMinimap() {
            ctx.clearRect(0, 0, 110, 110);
            ctx.fillStyle = '#00e5ff'; ctx.beginPath(); ctx.arc(55, 55, 4, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#999';
            // Only search a tight 3x3 block radius around the car!
            let cx = Math.round(car.position.x / blockSize) * blockSize;
            let cz = Math.round(car.position.z / blockSize) * blockSize;
            for (let x = cx - 90; x <= cx + 90; x += blockSize) {
                for (let z = cz - 90; z <= cz + 90; z += blockSize) {
                    if (Math.abs(x) > 15 || Math.abs(z) > 15) {
                        const relX = (x - car.position.x) * 0.3 + 55; const relZ = (z - car.position.z) * 0.3 + 55;
                        if(relX > 0 && relX < 110 && relZ > 0 && relZ < 110) ctx.fillRect(relX - 4, relZ - 4, 8, 8);
                    }
                }
            }
        }

        // --- GAME LOOP ---
        const cameraTarget = new THREE.Vector3(); const carBox = new THREE.Box3();
        function animate() {
            requestAnimationFrame(animate);
            const oldX = car.position.x; const oldZ = car.position.z;

            let cMaxSpeed = 0.85; let cFric = 0.96;
            if (car.position.x > 80) { cMaxSpeed = 0.3; cFric = 0.93; smokeMat.color.setHex(0xe6c27a); } 
            else { smokeMat.color.setHex(0x999999); }

            if (input.gas) speed += acceleration; if (input.rev) speed -= acceleration;
            speed *= cFric; if (speed > cMaxSpeed) speed = cMaxSpeed; if (speed < -cMaxSpeed / 2) speed = -cMaxSpeed / 2;

            frontLeftWheel.rotation.y = -steeringAngle * (Math.PI / 4); frontRightWheel.rotation.y = -steeringAngle * (Math.PI / 4);
            if (Math.abs(speed) > 0.005) car.rotation.y -= (steeringAngle * 0.07) * (speed > 0 ? 1 : -1);

            car.position.x += Math.sin(car.rotation.y) * speed; car.position.z += Math.cos(car.rotation.y) * speed;

            document.getElementById('speedDisplay').innerText = Math.abs(speed) > 0.01 ? Math.abs(Math.round((speed / 0.85) * 180)) : 0;
            updateMinimap();

            chassis.rotation.z += (steeringAngle * (speed / 0.8) * 0.15 - chassis.rotation.z) * 0.1;
            chassis.rotation.x += ((input.gas ? -0.05 : input.rev ? 0.05 : 0) - chassis.rotation.x) * 0.1;
            if (input.horn) { chassis.position.y = Math.random() * 0.05; window.headLightMat.emissive.setHex(0xffaa00); } 
            else { chassis.position.y = 0; window.headLightMat.emissive.setHex(0xddffff); }

            // Optimized Particles (Max 15 alive at once)
            if (Math.abs(speed) > 0.05 && Math.random() > 0.6 && particles.length < 15) {
                const smoke = new THREE.Mesh(smokeGeo, smokeMat); 
                smoke.position.set(car.position.x - Math.sin(car.rotation.y)*2.4, 0.4, car.position.z - Math.cos(car.rotation.y)*2.4);
                scene.add(smoke); particles.push({ mesh: smoke, life: 1.0 });
            }
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i]; p.life -= 0.04; p.mesh.position.y += 0.05; p.mesh.scale.setScalar(p.life);
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

            carBox.setFromObject(car); carBox.expandByScalar(-0.1); 
            for(let i = coins.length - 1; i >= 0; i--) {
                let c = coins[i]; c.mesh.rotation.y += 0.05; c.hitBox.setFromObject(c.mesh);
                if (carBox.intersectsBox(c.hitBox)) { scene.remove(c.mesh); coins.splice(i, 1); score++; document.getElementById('coinDisplay').innerText = score; }
            }

            for (let i = 0; i < buildingColliders.length; i++) {
                // Fast distance check to save CPU
                if (buildingColliders[i].distanceToPoint(car.position) < 5) {
                    if (carBox.intersectsBox(buildingColliders[i])) {
                        car.position.x = oldX - (Math.sin(car.rotation.y) * 0.2); car.position.z = oldZ - (Math.cos(car.rotation.y) * 0.2); speed = 0; break;
                    }
                }
            }

            camera.fov = THREE.MathUtils.lerp(camera.fov, 60 + (Math.abs(speed) * 25), 0.1); camera.updateProjectionMatrix();

            if ((input.gas || input.rev) && !isDraggingCamera) cameraOrbitAngle *= 0.9; 
            const finalCamAngle = car.rotation.y + cameraOrbitAngle;
            const idealOffset = new THREE.Vector3(car.position.x - Math.sin(finalCamAngle)*9, car.position.y + 4.5, car.position.z - Math.cos(finalCamAngle)*9);
            camera.position.lerp(idealOffset, 0.15); cameraTarget.lerp(car.position, 0.25); camera.lookAt(cameraTarget);
            
            sunLight.position.set(car.position.x + 50, 100, car.position.z - 50); sunLight.target = car;
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
